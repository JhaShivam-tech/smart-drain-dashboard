<script>
const firebaseConfig = {
  apiKey: "AIzaSyCyvHXBBQ_mQ5hevFGWHozMrM_Nnm_hbGM",
  authDomain: "smartdrainageblockagesystem.firebaseapp.com",
  databaseURL: "https://smartdrainageblockagesystem-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "smartdrainageblockagesystem",
  storageBucket: "smartdrainageblockagesystem.appspot.com",
  messagingSenderId: "162375793678", 
  appId: "1:162375793678:web:927b4c73f019be9896105f"
};

// INIT
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// 🔐 DEV USERS
const devUsers = [
  "your_email@gmail.com"
];

// LOGIN (REAL FIREBASE LOGIN)
async function handleLogin() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const user = await auth.signInWithEmailAndPassword(email, password);

    currentUserEmail = user.user.email;

    if (devUsers.includes(currentUserEmail)) {
      currentUserRole = "developer";
    } else if (localStorage.getItem("municipal_" + currentUserEmail)) {
      currentUserRole = "municipal";
    } else {
      currentUserRole = "user";
    }

    startSystem();

  } catch (e) {
    alert("Login failed: " + e.message);
  }
}

// REALTIME DATA
function startRealtimeListener() {
  db.ref("drain1").on("value", (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    updateUI(data);
  });
}

// UI UPDATE
function updateUI(data) {
  let blockage = data.blockage || 0;

  document.getElementById("blockageValue").innerText = blockage;

  // LED
  if (blockage >= 90) {
    setLED("red", "DANGER");
    showAlert(true);
    playSiren(true);
  } else if (blockage >= 70) {
    setLED("yellow", "WARNING");
    showAlert(false);
    playSiren(false);
  } else {
    setLED("green", "SAFE");
    showAlert(false);
    playSiren(false);
  }

  // values
  document.getElementById("flowValue").innerText = data.flow;
  document.getElementById("moistureValue").innerText = data.moisture;
  document.getElementById("gasValue").innerText = data.gas;
}

// LED UI
function setLED(color, text) {
  const led = document.getElementById("statusLED");
  const txt = document.getElementById("statusText");

  txt.innerText = text;

  led.className = "led";

  if (color === "red") led.style.background = "red";
  if (color === "yellow") led.style.background = "yellow";
  if (color === "green") led.style.background = "green";
}

// ALERT
function showAlert(show) {
  document.getElementById("criticalAlert").style.display = show ? "block" : "none";
}

// SIREN
let siren;
function playSiren(on) {
  if (!siren) {
    siren = new Audio("https://assets.mixkit.co/sfx/preview/2578/2578.wav");
    siren.loop = true;
  }

  if (on) siren.play();
  else siren.pause();
}

// START SYSTEM
function startSystem() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("mainDashboard").style.display = "block";

  document.getElementById("currentRole").innerText = currentUserRole.toUpperCase();

  startRealtimeListener();
}
</script>
