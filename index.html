<!DOCTYPE html>
<html>
<head>
<title>Smart Drain Dashboard</title>

<!-- Firebase v8 (IMPORTANT) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
  background:#0b1220;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

h1{
  color:#60a5fa;
}

.card{
  margin:15px;
  padding:15px;
  border-radius:15px;
  background:#1e293b;
  font-size:18px;
}

.red{color:#ef4444}
.green{color:#10b981}
.yellow{color:#f59e0b}
</style>
</head>

<body>

<h1>⚡ Smart Drain Monitoring</h1>

<div class="card">🚿 Flow: <span id="flow">--</span></div>
<div class="card">💧 Moisture: <span id="moisture">--</span></div>
<div class="card">☠ Gas: <span id="gas">--</span></div>
<div class="card">🚨 Blockage: <span id="blockage">--</span></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCyvHXBbQ...",
  databaseURL: "https://smartdrainageblockagesystem-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("drain1").on("value", (snapshot) => {
  const data = snapshot.val();

  if(data){
    document.getElementById("flow").innerText = data.flow + " L/min";
    document.getElementById("moisture").innerText = data.moisture + " %";
    document.getElementById("gas").innerText = data.gas;
    document.getElementById("blockage").innerText = data.blockage + " %";

    // Color logic
    let block = data.blockage;
    let el = document.getElementById("blockage");

    if(block < 40){
      el.className = "green";
    }
    else if(block < 70){
      el.className = "yellow";
    }
    else{
      el.className = "red";
    }
  }
});
</script>

</body>
</html>
