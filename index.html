<!DOCTYPE html>
<html>
<head>
<title>Smart Drain Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>

<style>
body{background:#0b1220;color:white;text-align:center;font-family:sans-serif}
.card{margin:10px;padding:15px;border-radius:15px;background:#1e293b}
.red{color:red}
.green{color:#10b981}
.yellow{color:#f59e0b}
</style>
</head>

<body>

<h1>🌐 Smart Drain Monitoring</h1>

<div class="card">Flow: <span id="flow"></span></div>
<div class="card">Moisture: <span id="moisture"></span></div>
<div class="card">Gas: <span id="gas"></span></div>
<div class="card">Blockage: <span id="blockage"></span></div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  databaseURL: "https://your-project.firebaseio.com/"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("/drain1").on("value", (snapshot) => {
  let data = snapshot.val();

  document.getElementById("flow").innerText = data.flow;
  document.getElementById("moisture").innerText = data.moisture;
  document.getElementById("gas").innerText = data.gas;

  let b = data.blockage;
  let blockText = document.getElementById("blockage");

  blockText.innerText = b + "%";

  if (b >= 80) {
    blockText.className = "red";
    alert("🚨 BLOCKAGE ALERT!");
  } 
  else if (b >= 40) {
    blockText.className = "yellow";
  } 
  else {
    blockText.className = "green";
  }
});
</script>

</body>
</html>
