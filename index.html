<!DOCTYPE html>
<html>
<head>
<title>Smart Drain Monitoring System</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}

.header{
  background:#020617;
  padding:20px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  color:#60a5fa;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 10px rgba(0,255,255,0.2);
}

.value{
  font-size:24px;
  margin-top:10px;
}

.green{color:#10b981}
.yellow{color:#f59e0b}
.red{color:#ef4444}

.status{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
⚡ Smart Drain Monitoring (Municipal Dashboard)
</div>

<div class="container">

<div class="card">
<h3>🚿 Flow</h3>
<div id="flow" class="value">--</div>
</div>

<div class="card">
<h3>💧 Moisture</h3>
<div id="moisture" class="value">--</div>
</div>

<div class="card">
<h3>☠ Gas</h3>
<div id="gas" class="value">--</div>
</div>

<div class="card">
<h3>🚨 Blockage</h3>
<div id="blockage" class="value">--</div>
<div id="status" class="status">--</div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCyvHXBbQ...",
  databaseURL: "https://smartdrainageblockagesystem-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("drain1").on("value", (snapshot) => {
  const data = snapshot.val();

  if(data){

    document.getElementById("flow").innerText = data.flow + " L/min";
    document.getElementById("moisture").innerText = data.moisture + " %";
    document.getElementById("gas").innerText = data.gas;
    document.getElementById("blockage").innerText = data.blockage + " %";

    let b = data.blockage;
    let status = document.getElementById("status");

    if(b < 40){
      status.innerText = "SAFE";
      status.className = "status green";
    }
    else if(b < 70){
      status.innerText = "WARNING";
      status.className = "status yellow";
    }
    else{
      status.innerText = "DANGER";
      status.className = "status red";
    }
  }
});
</script>

</body>
</html>
